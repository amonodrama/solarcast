[program:solarcast]
command=/bin/bash -c "sleep 5 && exec node /solarcast/server/index.js"
environment=DISPLAY=":99",HOME="/root",HLS_DIR="/tmp/hls",SCREEN_W="1920",SCREEN_H="1080"
autorestart=true
priority=100
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0